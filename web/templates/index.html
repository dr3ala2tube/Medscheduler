<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedScheduler</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
/* ── Reset & Variables ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;--text:#1a202c;--muted:#718096;
  --primary:#2563eb;--primary-dark:#1d4ed8;--danger:#dc2626;--success:#16a34a;
  --warn:#d97706;--header-h:86px;--sidebar-w:240px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Auth Screen ───────────────────────────────────────────────── */
#auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
.auth-card{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.auth-logo{font-size:2rem;font-weight:800;color:var(--primary);text-align:center;margin-bottom:4px}
.auth-sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:28px}
.auth-card label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;margin-top:16px}
.auth-card input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;outline:none;transition:border-color .15s}
.auth-card input:focus{border-color:var(--primary)}
.auth-err{color:var(--danger);font-size:.85rem;min-height:20px;margin-top:10px;text-align:center}
.btn-primary{width:100%;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:20px;transition:background .15s}
.btn-primary:hover{background:var(--primary-dark)}
.btn-link{background:none;border:none;color:var(--primary);font-size:.87rem;cursor:pointer;margin-top:12px;display:block;text-align:center;text-decoration:underline}

/* ── Main App Layout ───────────────────────────────────────────── */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
#app.visible{display:flex}

/* ── Header ────────────────────────────────────────────────────── */
header{background:var(--primary);color:#fff;display:flex;flex-direction:column;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-row1{display:flex;align-items:center;padding:0 14px;height:46px;gap:10px}
.hdr-row2{display:flex;align-items:center;padding:0 14px;height:40px;gap:6px;background:rgba(0,0,0,.12);flex-wrap:wrap;overflow:hidden}
.logo{font-weight:800;font-size:1.1rem;letter-spacing:-.02em}
.month-nav{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border-radius:8px;padding:4px 10px}
.month-nav button{background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;line-height:1;padding:2px 4px;border-radius:4px}
.month-nav button:hover{background:rgba(255,255,255,.2)}
#month-label{font-weight:700;font-size:.95rem;min-width:120px;text-align:center}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 11px;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s;height:30px;display:flex;align-items:center;gap:4px}
.hdr-btn:hover{background:rgba(255,255,255,.28)}
.hdr-btn.danger{background:rgba(220,38,38,.5)}
.hdr-btn.danger:hover{background:rgba(220,38,38,.8)}
.hdr-sep{width:1px;height:22px;background:rgba(255,255,255,.25);margin:0 2px;flex-shrink:0}
.user-badge{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:.82rem;opacity:.9;white-space:nowrap}
.user-badge button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;font-size:.78rem;cursor:pointer}

/* ── Body ──────────────────────────────────────────────────────── */
.body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ───────────────────────────────────────────────────── */
aside{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-section{padding:12px;border-bottom:1px solid var(--border)}
.sidebar-section h3{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}
.sidebar-section input,.sidebar-section select{width:100%;padding:6px 9px;border:1.5px solid var(--border);border-radius:6px;font-size:.82rem;margin-bottom:5px;outline:none}
.sidebar-section input:focus,.sidebar-section select:focus{border-color:var(--primary)}
.sb-row{display:flex;gap:5px}
.sb-row input{flex:1}
.btn-sm{padding:6px 10px;border:none;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-add{background:var(--primary);color:#fff;width:100%}
.btn-add:hover{background:var(--primary-dark)}
.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}

/* Doctor list */
.doc-list{flex:1;overflow-y:auto;padding:6px}
.doc-item{display:flex;align-items:center;padding:6px 8px;border-radius:6px;cursor:pointer;gap:6px;font-size:.83rem;border:1px solid transparent}
.doc-item:hover{background:var(--bg)}
.doc-item.selected{background:#eff6ff;border-color:#bfdbfe}
.doc-item .doc-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-team{font-size:.7rem;padding:1px 5px;border-radius:10px;font-weight:700;color:#fff}
.team-T1{background:#3b82f6}.team-T2{background:#10b981}.team-T3{background:#8b5cf6}
.doc-del{margin-left:auto;color:var(--muted);font-size:.85rem;opacity:0;padding:2px 5px;border-radius:4px;border:none;background:none;cursor:pointer}
.doc-item:hover .doc-del{opacity:1}
.doc-del:hover{color:var(--danger);background:#fee2e2}

/* ── Main content ──────────────────────────────────────────────── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:2px solid var(--border);background:var(--surface);flex-shrink:0}
.tab{padding:10px 20px;font-size:.87rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-panel{display:none;flex:1;overflow:auto}
.tab-panel.active{display:flex;flex-direction:column}

/* ── Schedule Grid ─────────────────────────────────────────────── */
.grid-wrap{flex:1;overflow:auto;position:relative}
table.schedule{border-collapse:collapse;table-layout:fixed;min-width:100%}
table.schedule th,table.schedule td{border:1px solid #e5e7eb;text-align:center;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table.schedule th{background:#f8fafc;font-weight:700;position:sticky;top:0;z-index:10;padding:4px 2px;font-size:.73rem}
table.schedule th.sticky-col{left:0;z-index:20;min-width:160px;max-width:160px;text-align:left;padding-left:8px}
table.schedule th.col-team{min-width:38px;max-width:38px}
table.schedule th.col-hrs{min-width:42px;max-width:42px}
table.schedule th.col-day{min-width:42px;max-width:42px}
table.schedule td.sticky-col{position:sticky;left:0;background:var(--surface);font-weight:600;text-align:left;padding:4px 8px;z-index:5;font-size:.8rem}
table.schedule td.col-team{font-size:.7rem;font-weight:700}
table.schedule td.col-hrs{color:var(--muted);font-size:.76rem}
table.schedule td.day-cell{cursor:pointer;height:30px;font-size:.76rem;font-weight:600;transition:opacity .1s}
table.schedule td.day-cell:hover{opacity:.75;outline:2px solid var(--primary);outline-offset:-2px}
table.schedule th.weekend{background:#fef9c3;color:#92400e}
table.schedule td.weekend-row{background:#fffbeb!important}
table.schedule tr:hover td:not(.sticky-col){filter:brightness(.95)}

/* ── Summary Table ─────────────────────────────────────────────── */
.summary-wrap{padding:20px;overflow:auto}
table.summary{border-collapse:collapse;width:100%;font-size:.83rem}
table.summary th{background:#f8fafc;border:1px solid var(--border);padding:8px 10px;font-weight:700;text-align:center;position:sticky;top:0}
table.summary th:first-child{text-align:left}
table.summary td{border:1px solid var(--border);padding:6px 10px;text-align:center}
table.summary td:first-child{font-weight:600;text-align:left}
table.summary tr:nth-child(even){background:#f8fafc}
table.summary .high{color:var(--danger);font-weight:700}

/* ── Modals ────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal h2{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 4px}
.modal input,.modal select{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:.9rem;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--primary)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.btn-cancel{padding:8px 16px;background:var(--bg);border:1px solid var(--border);border-radius:7px;font-size:.87rem;cursor:pointer}
.btn-ok{padding:8px 18px;background:var(--primary);color:#fff;border:none;border-radius:7px;font-size:.87rem;font-weight:600;cursor:pointer}
.btn-ok:hover{background:var(--primary-dark)}
.modal-err{color:var(--danger);font-size:.82rem;margin-top:8px;min-height:18px}

/* Leave list */
.leave-item{display:flex;align-items:center;padding:6px 8px;border-radius:6px;background:var(--bg);margin-top:6px;gap:8px;font-size:.82rem}
.leave-item .leave-name{font-weight:600;flex:1}
.leave-del{margin-left:auto;color:var(--muted);background:none;border:none;cursor:pointer;font-size:.85rem}
.leave-del:hover{color:var(--danger)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;padding:10px 20px;border-radius:8px;font-size:.87rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Status bar */
.statusbar{padding:4px 14px;font-size:.77rem;color:var(--muted);background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ── Auth Screen ─────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🩺 MedScheduler</div>
    <div class="auth-sub">Team Schedule Management</div>
    <label>Email address</label>
    <input type="email" id="auth-email" placeholder="doctor@hospital.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="auth-pw" placeholder="••••••••" autocomplete="current-password">
    <div class="auth-err" id="auth-err"></div>
    <button class="btn-primary" id="btn-signin">Sign In</button>
    <button class="btn-link" id="btn-create">Create account instead</button>
  </div>
</div>

<!-- ── Main App ────────────────────────────────────────────────── -->
<div id="app">
  <!-- Header -->
  <header>
    <!-- Row 1: branding + month nav + user -->
    <div class="hdr-row1">
      <span class="logo">🩺 MedScheduler</span>
      <div class="month-nav">
        <button id="prev-month" title="Previous month">◀</button>
        <span id="month-label">April 2026</span>
        <button id="next-month" title="Next month">▶</button>
      </div>
      <div class="user-badge">
        <span id="user-email-lbl"></span>
        <button id="btn-signout">Sign out</button>
      </div>
    </div>
    <!-- Row 2: all action buttons -->
    <div class="hdr-row2">
      <button class="hdr-btn" id="btn-autoschedule">⚡ Auto-Schedule</button>
      <button class="hdr-btn" id="btn-leave">📅 Annual Leave</button>
      <button class="hdr-btn" id="btn-block">🚫 Block Specialty</button>
      <button class="hdr-btn" id="btn-manual">📌 Manual Assign</button>
      <div class="hdr-sep"></div>
      <button class="hdr-btn" id="btn-export-rota">📥 Export Rota</button>
      <button class="hdr-btn" id="btn-export-full">📥 Export Full</button>
      <div class="hdr-sep"></div>
      <button class="hdr-btn" id="btn-save">☁ Save</button>
      <button class="hdr-btn" id="btn-load">⬇ Load</button>
      <div class="hdr-sep"></div>
      <button class="hdr-btn danger" id="btn-clear">🗑 Clear Month</button>
    </div>
  </header>

  <div class="body">
    <!-- Sidebar -->
    <aside>
      <div class="sidebar-section">
        <h3>Add Physician</h3>
        <input type="text" id="doc-name" placeholder="Full name (e.g. DR. ALAA)">
        <div class="sb-row">
          <input type="text" id="doc-initials" placeholder="Initials" style="max-width:80px">
          <select id="doc-spec" style="flex:1"></select>
        </div>
        <button class="btn-sm btn-add" id="btn-add-doc">+ Add Physician</button>
        <button class="btn-sm btn-ghost" id="btn-import-doc" style="width:100%;margin-top:5px">⬆ Import from File</button>
        <input type="file" id="import-file-input" accept=".txt,.csv" style="display:none">
      </div>
      <div style="padding:8px 12px;border-bottom:1px solid var(--border)">
        <h3 style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px">Physicians <span id="doc-count" style="font-weight:400;color:var(--muted)"></span></h3>
      </div>
      <div class="doc-list" id="doc-list"></div>
    </aside>

    <!-- Main content -->
    <main>
      <div class="tabs">
        <div class="tab active" data-tab="schedule">Schedule</div>
        <div class="tab" data-tab="summary">Summary</div>
      </div>

      <div class="tab-panel active" id="tab-schedule">
        <div class="grid-wrap" id="grid-wrap">
          <table class="schedule" id="schedule-table">
            <thead><tr id="schedule-head"></tr></thead>
            <tbody id="schedule-body"></tbody>
          </table>
        </div>
      </div>

      <div class="tab-panel" id="tab-summary">
        <div class="summary-wrap">
          <table class="summary" id="summary-table">
            <thead><tr id="summary-head"></tr></thead>
            <tbody id="summary-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="statusbar" id="statusbar">Ready</div>
</div>

<!-- ── Cell Edit Modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="cell-modal" style="display:none">
  <div class="modal">
    <h2>✏️ Edit Assignment</h2>
    <div id="cell-info" style="font-size:.85rem;color:var(--muted);margin-bottom:4px"></div>
    <label>Assign as</label>
    <select id="cell-code"></select>
    <div class="modal-err" id="cell-err"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cell-cancel">Cancel</button>
      <button class="btn-ok" id="cell-ok">Apply</button>
    </div>
  </div>
</div>

<!-- ── Leave Modal ─────────────────────────────────────────────── -->
<div class="modal-overlay" id="leave-modal" style="display:none">
  <div class="modal">
    <h2>📅 Annual Leave</h2>
    <label>Physician</label>
    <select id="leave-doc"></select>
    <label>From</label>
    <input type="date" id="leave-from">
    <label>To</label>
    <input type="date" id="leave-to">
    <div class="modal-err" id="leave-err"></div>
    <button class="btn-ok" style="width:100%;margin-top:12px" id="leave-add-btn">Add Leave</button>
    <div id="leave-list" style="margin-top:14px"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="leave-close">Close</button>
    </div>
  </div>
</div>

<!-- ── Block Specialty Modal ───────────────────────────────────── -->
<div class="modal-overlay" id="block-modal" style="display:none">
  <div class="modal">
    <h2>🚫 Block Specialty</h2>
    <label>Specialty</label>
    <select id="block-code"></select>
    <label>From</label>
    <input type="date" id="block-from">
    <label>To</label>
    <input type="date" id="block-to">
    <div class="modal-err" id="block-err"></div>
    <button class="btn-ok" style="width:100%;margin-top:12px" id="block-add-btn">Add Block</button>
    <div id="block-list" style="margin-top:14px"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="block-close">Close</button>
    </div>
  </div>
</div>

<!-- ── Manual Assign Modal ─────────────────────────────────────── -->
<div class="modal-overlay" id="manual-modal" style="display:none">
  <div class="modal">
    <h2>📌 Manual Assignment</h2>
    <label>Physician</label>
    <select id="manual-doc"></select>
    <label>Duty / Specialty</label>
    <select id="manual-code"></select>
    <label>Day</label>
    <input type="number" id="manual-day" min="1" max="31" value="1">
    <div class="modal-err" id="manual-err"></div>
    <button class="btn-ok" style="width:100%;margin-top:12px" id="manual-add-btn">Add Assignment</button>
    <div id="manual-list" style="margin-top:14px"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="manual-close">Close</button>
    </div>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ── Firebase init ──────────────────────────────────────────────────
const fbApp = firebase.initializeApp({
  apiKey:            "AIzaSyC_d-HgnEnLAWW1f3dSKjuuAz4eplcVWz8",
  authDomain:        "medscheduler-e0853.firebaseapp.com",
  projectId:         "medscheduler-e0853",
  storageBucket:     "medscheduler-e0853.firebasestorage.app",
  messagingSenderId: "34915686489",
  appId:             "1:34915686489:web:2f62ad062e47558934f948"
});
const auth = firebase.auth();

// ── App state ──────────────────────────────────────────────────────
const S = {
  yr: new Date().getFullYear(),
  mo: new Date().getMonth(),   // 0-indexed
  docs: [], asgn: {}, leaves: [], spec_blocks: [], manual_asgns: [],
  next_doc_id: 1, next_leave_id: 1, next_spec_block_id: 1, next_manual_id: 1,
  idToken: null,
  C: null,  // constants from server
  editing: null,  // {pid, day}
};

// ── Utility ────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const p2 = n  => String(n).padStart(2,'0');
const ak = (pid,d)=> `${pid}|${S.yr}|${S.mo}|${d}`;
const getAsgn = (pid,d)=> S.asgn[ak(pid,d)] || '_';
const setAsgn = (pid,d,v)=>{ S.asgn[ak(pid,d)]=v; };

function dim(y,m){ // days in month (m=0-indexed)
  return new Date(y, m+1, 0).getDate();
}
function dow(y,m,d){ // 0=Sun..6=Sat
  return new Date(y,m,d).getDay();
}
function isWeekend(y,m,d){ const w=dow(y,m,d); return w===0||w===6; }
const DN = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

let toastTimer;
function toast(msg,dur=2800){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),dur);
}
function setStatus(msg){ $('statusbar').textContent=msg; }

// ── API helper ─────────────────────────────────────────────────────
async function api(method, path, body){
  const hdrs={'Content-Type':'application/json','Authorization':`Bearer ${S.idToken}`};
  const res = await fetch(path, {method, headers:hdrs, body: body?JSON.stringify(body):undefined});
  const json = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

// ── Auth ───────────────────────────────────────────────────────────
$('btn-signin').onclick = () => doAuth(false);
$('btn-create').onclick = () => doAuth(true);
$('auth-email').addEventListener('keydown', e=>{ if(e.key==='Enter') doAuth(false); });
$('auth-pw').addEventListener('keydown',    e=>{ if(e.key==='Enter') doAuth(false); });

async function doAuth(isCreate){
  const email=$('auth-email').value.trim(), pw=$('auth-pw').value;
  $('auth-err').textContent='';
  if(!email||!pw){ $('auth-err').textContent='Please fill in both fields.'; return; }
  $('btn-signin').disabled=true; $('btn-signin').innerHTML='<span class="spinner"></span>Connecting…';
  try {
    if(isCreate) await auth.createUserWithEmailAndPassword(email,pw);
    else         await auth.signInWithEmailAndPassword(email,pw);
  } catch(e){
    $('auth-err').textContent = friendlyAuthError(e.code);
    $('btn-signin').disabled=false; $('btn-signin').textContent='Sign In';
  }
}

function friendlyAuthError(code){
  const m={
    'auth/user-not-found':'No account found with that email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/email-already-in-use':'An account with that email already exists.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/too-many-requests':'Too many attempts. Please try again later.',
    'auth/invalid-credential':'Invalid email or password.',
  };
  return m[code] || code;
}

auth.onAuthStateChanged(async user => {
  if(user){
    S.idToken = await user.getIdToken();
    // Refresh token every 50 min
    setInterval(async()=>{ S.idToken = await user.getIdToken(true); }, 50*60*1000);
    $('user-email-lbl').textContent = user.email;
    $('auth-screen').style.display='none';
    $('app').classList.add('visible');
    await loadConstants();
    await loadData();
    renderAll();
  } else {
    $('auth-screen').style.display='flex';
    $('app').classList.remove('visible');
    $('btn-signin').disabled=false; $('btn-signin').textContent='Sign In';
  }
});

$('btn-signout').onclick = ()=> auth.signOut();

// ── Constants ──────────────────────────────────────────────────────
async function loadConstants(){
  try { S.C = await api('GET','/api/constants'); populateStaticDropdowns(); }
  catch(e){ toast('Could not load constants: '+e.message,4000); }
}

function populateStaticDropdowns(){
  // Specialty selector in sidebar
  const specSel=$('doc-spec');
  specSel.innerHTML=''; S.C.spec_options.forEach(s=>{
    const o=document.createElement('option'); o.value=s; o.textContent=s; specSel.appendChild(o);
  });
  // Cell edit dropdown
  const cellSel=$('cell-code');
  cellSel.innerHTML='';
  Object.entries(S.C.shifts).forEach(([code,meta])=>{
    if(code==='_') return;
    const o=document.createElement('option'); o.value=code; o.textContent=`${meta.short||code}  –  ${meta.label}`; cellSel.appendChild(o);
  });
  const blank=document.createElement('option'); blank.value='_'; blank.textContent='— Clear / Blank'; cellSel.appendChild(blank);
  // Block specialty dropdown
  const blkSel=$('block-code');
  blkSel.innerHTML=''; S.C.blockable.forEach(code=>{
    const o=document.createElement('option'); o.value=code; o.textContent=`${code}  –  ${S.C.shifts[code]?.label||code}`; blkSel.appendChild(o);
  });
  // Manual assign dropdown
  const manSel=$('manual-code');
  manSel.innerHTML=''; S.C.manual_codes.forEach(code=>{
    const o=document.createElement('option'); o.value=code; o.textContent=`${code}  –  ${S.C.shifts[code]?.label||code}`; manSel.appendChild(o);
  });
}

// ── Load / Save cloud data ─────────────────────────────────────────
async function loadData(){
  setStatus('Loading from cloud…');
  try {
    const res = await api('GET','/api/data');
    if(res.data) applyData(res.data);
    else initDefaultData();
    setStatus('Loaded from cloud.');
  } catch(e){
    initDefaultData();
    setStatus('No cloud data – starting fresh.');
  }
}

function applyData(d){
  S.yr=d.yr||S.yr; S.mo=d.mo||S.mo;
  S.next_doc_id=d.next_doc_id||1; S.next_leave_id=d.next_leave_id||1;
  S.next_spec_block_id=d.next_spec_block_id||1; S.next_manual_id=d.next_manual_id||1;
  S.docs=(d.docs||[]).map(x=>({...x,id:+x.id,first_duty_day:+(x.first_duty_day||1)}));
  S.asgn=d.asgn||{};
  S.leaves=(d.leaves||[]).map(x=>({...x,id:+x.id,pid:+x.pid}));
  S.spec_blocks=(d.spec_blocks||[]).map(x=>({...x,id:+x.id}));
  S.manual_asgns=(d.manual_asgns||[]).map(x=>({...x,id:+x.id,pid:+x.pid,day:+x.day}));
}

function initDefaultData(){
  S.docs=[]; S.asgn={}; S.leaves=[]; S.spec_blocks=[]; S.manual_asgns=[];
  S.next_doc_id=1;
}

function serializeState(){
  return {yr:S.yr,mo:S.mo,next_doc_id:S.next_doc_id,next_leave_id:S.next_leave_id,
    next_spec_block_id:S.next_spec_block_id,next_manual_id:S.next_manual_id,
    docs:S.docs,asgn:S.asgn,leaves:S.leaves,spec_blocks:S.spec_blocks,manual_asgns:S.manual_asgns};
}

$('btn-save').onclick = async()=>{
  $('btn-save').disabled=true; $('btn-save').innerHTML='<span class="spinner"></span>Saving…';
  try { await api('POST','/api/data',serializeState()); toast('✓ Saved to cloud'); }
  catch(e){ toast('Save failed: '+e.message,4000); }
  finally { $('btn-save').disabled=false; $('btn-save').textContent='☁ Save'; }
};

$('btn-load').onclick = async()=>{
  if(!confirm('Replace current schedule with last cloud save?')) return;
  $('btn-load').disabled=true;
  try {
    const res=await api('GET','/api/data');
    if(res.data){ applyData(res.data); renderAll(); toast('✓ Loaded from cloud'); }
    else toast('No cloud data found.',4000);
  } catch(e){ toast('Load failed: '+e.message,4000); }
  finally { $('btn-load').disabled=false; }
};

// ── Month navigation ───────────────────────────────────────────────
function updateMonthLabel(){ $('month-label').textContent=`${MONTHS[S.mo]} ${S.yr}`; }
$('prev-month').onclick=()=>{ if(S.mo===0){S.mo=11;S.yr--;}else S.mo--; renderAll(); };
$('next-month').onclick=()=>{ if(S.mo===11){S.mo=0;S.yr++;}else S.mo++; renderAll(); };

// ── Tabs ───────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    $('tab-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='summary') renderSummary();
  };
});

// ── Render all ─────────────────────────────────────────────────────
function renderAll(){ updateMonthLabel(); renderDocList(); renderSchedule(); }

// ── Doctor list ────────────────────────────────────────────────────
$('btn-add-doc').onclick=()=>{
  const name=$('doc-name').value.trim().toUpperCase();
  if(!name){ toast('Enter a name first.'); return; }
  const initials=$('doc-initials').value.trim().toUpperCase();
  const specLabel=$('doc-spec').value;
  let team='T'+(((S.docs.length)%3)+1);
  // Sync team if team specialty selected
  if(specLabel==='Team 1 Morning') team='T1';
  else if(specLabel==='Team 2 Morning') team='T2';
  else if(specLabel==='Team 3 Morning') team='T3';
  S.docs.push({id:S.next_doc_id++,name,spec:specLabel,team,initials,first_duty_day:1});
  $('doc-name').value=''; $('doc-initials').value='';
  renderAll();
};

$('doc-name').addEventListener('keydown',e=>{ if(e.key==='Enter') $('btn-add-doc').click(); });

function renderDocList(){
  const list=$('doc-list'); list.innerHTML='';
  $('doc-count').textContent=`(${S.docs.length})`;
  S.docs.forEach(ph=>{
    const item=document.createElement('div');
    item.className='doc-item';
    item.innerHTML=`
      <span class="doc-team team-${ph.team}">${ph.team}</span>
      <span class="doc-name" title="${ph.name}">${ph.name}</span>
      <button class="doc-del" data-id="${ph.id}" title="Remove">✕</button>`;
    item.querySelector('.doc-del').onclick=e=>{
      e.stopPropagation();
      if(confirm(`Remove ${ph.name}?`)){ S.docs=S.docs.filter(d=>d.id!==+e.target.dataset.id); renderAll(); }
    };
    list.appendChild(item);
  });
  // Refresh physician dropdowns in modals
  ['leave-doc','manual-doc'].forEach(id=>{
    const sel=$(id); sel.innerHTML='';
    S.docs.forEach(ph=>{ const o=document.createElement('option');o.value=ph.id;o.textContent=ph.name;sel.appendChild(o); });
  });
}

// ── Schedule grid ──────────────────────────────────────────────────
function renderSchedule(){
  if(!S.C){ return; }
  const td=dim(S.yr,S.mo);
  const head=$('schedule-head'), body=$('schedule-body');
  head.innerHTML=''; body.innerHTML='';

  // Header row
  const thDoc=document.createElement('th'); thDoc.className='sticky-col'; thDoc.textContent='Physician'; head.appendChild(thDoc);
  const thTeam=document.createElement('th'); thTeam.className='col-team'; thTeam.textContent='Team'; head.appendChild(thTeam);
  const thHrs=document.createElement('th'); thHrs.className='col-hrs'; thHrs.textContent='Hrs'; head.appendChild(thHrs);
  for(let d=1;d<=td;d++){
    const th=document.createElement('th'); th.className='col-day'+(isWeekend(S.yr,S.mo,d)?' weekend':'');
    th.innerHTML=`<div>${d}</div><div style="font-weight:400;font-size:.68rem">${DN[dow(S.yr,S.mo,d)]}</div>`;
    head.appendChild(th);
  }

  // Rows
  S.docs.forEach(ph=>{
    const tr=document.createElement('tr');
    // Name cell
    const tdName=document.createElement('td'); tdName.className='sticky-col';
    tdName.textContent=ph.name; tr.appendChild(tdName);
    // Team cell
    const tdTeam=document.createElement('td'); tdTeam.className='col-team';
    tdTeam.innerHTML=`<span class="doc-team team-${ph.team}" style="font-size:.68rem">${ph.team}</span>`; tr.appendChild(tdTeam);
    // Hours cell
    let hrs=0;
    for(let d=1;d<=td;d++) hrs+=(S.C.shifts[getAsgn(ph.id,d)]?.h||0);
    const tdHrs=document.createElement('td'); tdHrs.className='col-hrs';
    tdHrs.textContent=hrs; if(hrs>160) tdHrs.style.color='#dc2626'; tr.appendChild(tdHrs);
    // Day cells
    for(let d=1;d<=td;d++){
      const code=getAsgn(ph.id,d);
      const td2=document.createElement('td');
      td2.className='day-cell'+(isWeekend(S.yr,S.mo,d)?' weekend-row':'');
      td2.textContent=S.C.shifts[code]?.short||'';
      td2.style.background='#'+S.C.color_map[code]||'fff';
      td2.dataset.pid=ph.id; td2.dataset.day=d;
      td2.onclick=openCellEdit;
      tr.appendChild(td2);
    }
    body.appendChild(tr);
  });
}

// ── Cell edit ──────────────────────────────────────────────────────
function openCellEdit(e){
  const pid=+e.target.dataset.pid, day=+e.target.dataset.day;
  const ph=S.docs.find(p=>p.id===pid);
  S.editing={pid,day};
  $('cell-info').textContent=`${ph?.name}  ·  Day ${day} (${DN[dow(S.yr,S.mo,day)]})`;
  const curCode=getAsgn(pid,day);
  $('cell-code').value=curCode;
  $('cell-err').textContent='';
  $('cell-modal').style.display='flex';
}
$('cell-ok').onclick=()=>{
  const {pid,day}=S.editing;
  const code=$('cell-code').value;
  setAsgn(pid,day,code);
  $('cell-modal').style.display='none';
  renderSchedule();
};
$('cell-cancel').onclick=()=>{ $('cell-modal').style.display='none'; };

// ── Auto-schedule ──────────────────────────────────────────────────
$('btn-autoschedule').onclick=async()=>{
  if(S.docs.length<3){ toast('Need at least 3 physicians.',3000); return; }
  $('btn-autoschedule').disabled=true;
  $('btn-autoschedule').innerHTML='<span class="spinner"></span>Scheduling…';
  setStatus('Running auto-scheduler…');
  try {
    const res=await api('POST','/api/schedule',{
      docs:S.docs,asgn:S.asgn,yr:S.yr,mo:S.mo,
      leaves:S.leaves,spec_blocks:S.spec_blocks,manual_asgns:S.manual_asgns,
    });
    // Merge new assignments into S.asgn
    Object.assign(S.asgn, res.asgn);
    renderSchedule();
    setStatus('Auto-schedule complete.');
    toast('✓ Schedule generated');
  } catch(e){ toast('Schedule error: '+e.message,5000); setStatus('Schedule failed.'); }
  finally { $('btn-autoschedule').disabled=false; $('btn-autoschedule').textContent='⚡ Auto-Schedule'; }
};

// ── Clear month ────────────────────────────────────────────────────
$('btn-clear').onclick=()=>{
  if(!confirm('Clear all assignments for this month?')) return;
  const prefix=`|${S.yr}|${S.mo}|`;
  Object.keys(S.asgn).forEach(k=>{ if(k.includes(prefix)) delete S.asgn[k]; });
  S.manual_asgns=S.manual_asgns.filter(ma=>false); // clear all manual for simplicity
  renderSchedule();
  toast('Month cleared.');
};

// ── Annual Leave modal ────────────────────────────────────────────
$('btn-leave').onclick=()=>{ renderLeaveList(); $('leave-modal').style.display='flex'; };
$('leave-close').onclick=()=>{ $('leave-modal').style.display='none'; };
$('leave-add-btn').onclick=()=>{
  const pid=+$('leave-doc').value;
  const f=$('leave-from').value, t=$('leave-to').value;
  if(!pid||!f||!t){ $('leave-err').textContent='Fill all fields.'; return; }
  if(f>t){ $('leave-err').textContent='From must be ≤ To.'; return; }
  S.leaves.push({id:S.next_leave_id++,pid,f,t});
  $('leave-err').textContent=''; renderLeaveList();
};
function renderLeaveList(){
  const div=$('leave-list'); div.innerHTML='';
  S.leaves.forEach(lb=>{
    const ph=S.docs.find(p=>p.id===lb.pid);
    const item=document.createElement('div'); item.className='leave-item';
    item.innerHTML=`<span class="leave-name">${ph?.name||'#'+lb.pid}</span>
      <span style="color:var(--muted);font-size:.78rem">${lb.f} → ${lb.t}</span>
      <button class="leave-del" data-id="${lb.id}">✕</button>`;
    item.querySelector('.leave-del').onclick=e=>{
      S.leaves=S.leaves.filter(x=>x.id!==+e.target.dataset.id); renderLeaveList();
    };
    div.appendChild(item);
  });
}

// ── Block Specialty modal ─────────────────────────────────────────
$('btn-block').onclick=()=>{ renderBlockList(); $('block-modal').style.display='flex'; };
$('block-close').onclick=()=>{ $('block-modal').style.display='none'; };
$('block-add-btn').onclick=()=>{
  const code=$('block-code').value;
  const f=$('block-from').value, t=$('block-to').value;
  if(!f||!t){ $('block-err').textContent='Fill all fields.'; return; }
  if(f>t){ $('block-err').textContent='From must be ≤ To.'; return; }
  S.spec_blocks.push({id:S.next_spec_block_id++,code,f,t});
  $('block-err').textContent=''; renderBlockList();
};
function renderBlockList(){
  const div=$('block-list'); div.innerHTML='';
  S.spec_blocks.forEach(sb=>{
    const item=document.createElement('div'); item.className='leave-item';
    item.innerHTML=`<span class="leave-name">${sb.code}</span>
      <span style="color:var(--muted);font-size:.78rem">${sb.f} → ${sb.t}</span>
      <button class="leave-del" data-id="${sb.id}">✕</button>`;
    item.querySelector('.leave-del').onclick=e=>{
      S.spec_blocks=S.spec_blocks.filter(x=>x.id!==+e.target.dataset.id); renderBlockList();
    };
    div.appendChild(item);
  });
}

// ── Manual Assign modal ───────────────────────────────────────────
$('btn-manual').onclick=()=>{ renderManualList(); $('manual-modal').style.display='flex'; };
$('manual-close').onclick=()=>{ $('manual-modal').style.display='none'; };
$('manual-add-btn').onclick=()=>{
  const pid=+$('manual-doc').value;
  const code=$('manual-code').value;
  const day=+$('manual-day').value;
  const td=dim(S.yr,S.mo);
  if(!pid||!code||day<1||day>td){ $('manual-err').textContent='Invalid input.'; return; }
  const existing=getAsgn(pid,day);
  if(existing!=='_'&&existing!=='O'){ $('manual-err').textContent=`Day ${day} already assigned: ${existing}`; return; }
  S.manual_asgns.push({id:S.next_manual_id++,pid,code,day});
  setAsgn(pid,day,code);
  $('manual-err').textContent=''; renderManualList(); renderSchedule();
};
function renderManualList(){
  const div=$('manual-list'); div.innerHTML='';
  S.manual_asgns.forEach(ma=>{
    const ph=S.docs.find(p=>p.id===ma.pid);
    const item=document.createElement('div'); item.className='leave-item';
    item.innerHTML=`<span class="leave-name">${ph?.name||'#'+ma.pid}</span>
      <span style="font-weight:600;color:var(--primary)">${ma.code}</span>
      <span style="color:var(--muted);font-size:.78rem">Day ${ma.day}</span>
      <button class="leave-del" data-id="${ma.id}">✕</button>`;
    item.querySelector('.leave-del').onclick=e=>{
      const id=+e.target.dataset.id;
      const m=S.manual_asgns.find(x=>x.id===id);
      if(m) setAsgn(m.pid,m.day,'_');
      S.manual_asgns=S.manual_asgns.filter(x=>x.id!==id);
      renderManualList(); renderSchedule();
    };
    div.appendChild(item);
  });
}

// ── Summary tab ───────────────────────────────────────────────────
async function renderSummary(){
  if(!S.docs.length) return;
  try {
    const res=await api('POST','/api/summary',{docs:S.docs,asgn:S.asgn,yr:S.yr,mo:S.mo});
    const cols=['name','team','total','calls','daycare','postcall','off','leave','weekend_off'];
    const labels=['Physician','Team','Total Hrs','On-Calls','Daycare','Post-Call','Off','Leave','Weekend Off'];
    const thead=$('summary-head'), tbody=$('summary-body');
    thead.innerHTML=''; tbody.innerHTML='';
    const hr=document.createElement('tr');
    labels.forEach(l=>{ const th=document.createElement('th');th.textContent=l;hr.appendChild(th); });
    thead.appendChild(hr);
    res.rows.forEach(row=>{
      const tr=document.createElement('tr');
      cols.forEach(c=>{
        const td=document.createElement('td');
        td.textContent=row[c]??'';
        if(c==='total'&&row[c]>160) td.className='high';
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  } catch(e){ toast('Summary error: '+e.message,4000); }
}

// ── Export ────────────────────────────────────────────────────────
async function doExport(type){
  const btn=$(type==='rota'?'btn-export-rota':'btn-export-full');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Exporting…';
  try {
    const body={docs:S.docs,asgn:S.asgn,yr:S.yr,mo:S.mo};
    const hdrs={'Content-Type':'application/json','Authorization':`Bearer ${S.idToken}`};
    const res=await fetch(`/api/export/${type}`,{method:'POST',headers:hdrs,body:JSON.stringify(body)});
    if(!res.ok){ const e=await res.json(); throw new Error(e.error||'Export failed'); }
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    const cd=res.headers.get('Content-Disposition')||'';
    const m=cd.match(/filename="?([^"]+)"?/);
    a.download=m?m[1]:`MedScheduler_${MONTHS[S.mo]}_${S.yr}.xlsx`;
    a.click(); URL.revokeObjectURL(url);
    toast('✓ Downloaded');
  } catch(e){ toast('Export error: '+e.message,5000); }
  finally { btn.disabled=false; btn.textContent=type==='rota'?'📥 Export Rota':'📥 Export Full'; }
}
$('btn-export-rota').onclick=()=>doExport('rota');
$('btn-export-full').onclick=()=>doExport('full');

// ── Import Physicians from file ───────────────────────────────────
// Supported formats (one physician per line):
//   DR. ALAA | AH          (name | initials)
//   DR. ALAA	AH           (name <TAB> initials)
//   DR. ALAA               (name only)
$('btn-import-doc').onclick = () => $('import-file-input').click();
$('import-file-input').onchange = e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split(/\r?\n/);
    let added = 0, updated = 0, skipped = 0;
    lines.forEach(raw => {
      const line = raw.trim();
      if(!line || line.startsWith('#')) return; // skip blank/comment lines
      let name, initials = '';
      if(line.includes('|')){
        const parts = line.split('|');
        name = parts[0].trim().toUpperCase();
        initials = (parts[1]||'').trim().toUpperCase();
      } else if(line.includes('\t')){
        const parts = line.split('\t');
        name = parts[0].trim().toUpperCase();
        initials = (parts[1]||'').trim().toUpperCase();
      } else {
        name = line.toUpperCase();
      }
      if(!name){ skipped++; return; }
      const existing = S.docs.find(d => d.name === name);
      if(existing){
        if(initials) existing.initials = initials;
        updated++;
      } else {
        const specLabel = S.C ? S.C.spec_options[0] : 'General';
        const team = 'T'+(((S.docs.length) % 3) + 1);
        S.docs.push({id:S.next_doc_id++, name, spec:specLabel, team, initials, first_duty_day:1});
        added++;
      }
    });
    e.target.value = ''; // reset so same file can be re-imported
    renderAll();
    toast(`✓ Import done: ${added} added, ${updated} updated, ${skipped} skipped`);
  };
  reader.readAsText(file);
};

// ── Close modals on overlay click ─────────────────────────────────
['cell-modal','leave-modal','block-modal','manual-modal'].forEach(id=>{
  $(id).addEventListener('click',e=>{ if(e.target===$(id)) $(id).style.display='none'; });
});
